<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Miniventure RPG - Um mundo de aventuras te espera">
    <title>{% block title %}Miniventure RPG{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        :root {
            --bg-dark: #0d0d0d;
            --bg-medium: #1a1a2e;
            --bg-panel: #16213e;
            --bg-card: #1c2a4a;
            --gold: #c9a84c;
            --gold-light: #e6c866;
            --gold-dim: #8a7434;
            --parchment: #f5e6c8;
            --parchment-dark: #d4c4a0;
            --text-light: #e0d8c8;
            --text-muted: #8a8272;
            --text-dark: #2a1f14;
            --accent-red: #8b1a1a;
            --accent-green: #2d6a2d;
            --accent-blue: #1a3a5c;
            --border-gold: #c9a84c44;
            --border-subtle: #ffffff10;
            --shadow-dark: rgba(0, 0, 0, 0.6);
            --font-title: 'MedievalSharp', cursive;
            --font-body: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --nav-height: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(201, 168, 76, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(26, 58, 92, 0.08) 0%, transparent 50%);
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--nav-height);
            background: linear-gradient(180deg, var(--bg-medium) 0%, #111 100%);
            border-bottom: 2px solid var(--border-gold);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            z-index: 1000;
            box-shadow: 0 2px 12px var(--shadow-dark);
        }

        .nav-brand {
            font-family: var(--font-title);
            font-size: 1.5rem;
            color: var(--gold);
            text-decoration: none;
            text-shadow: 0 0 10px rgba(201, 168, 76, 0.3);
            letter-spacing: 1px;
        }

        .nav-brand:hover {
            color: var(--gold-light);
            text-shadow: 0 0 16px rgba(201, 168, 76, 0.5);
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            margin-left: 24px;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--gold);
        }

        main {
            margin-top: var(--nav-height);
            padding: 32px 24px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            font-family: var(--font-title);
            font-size: 1.05rem;
            border: 2px solid var(--gold-dim);
            border-radius: 6px;
            background: linear-gradient(180deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            color: var(--gold);
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            transition: all 0.25s ease;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            border-color: var(--gold);
            color: var(--gold-light);
            box-shadow: 0 0 16px rgba(201, 168, 76, 0.2), inset 0 0 16px rgba(201, 168, 76, 0.05);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary {
            background: linear-gradient(180deg, var(--gold-dim) 0%, #5a4a1e 100%);
            color: var(--parchment);
            border-color: var(--gold);
        }

        .btn-primary:hover {
            background: linear-gradient(180deg, var(--gold) 0%, var(--gold-dim) 100%);
            color: var(--bg-dark);
        }

        .btn-danger {
            border-color: var(--accent-red);
            color: #e05555;
        }

        .btn-danger:hover {
            border-color: #cc3333;
            box-shadow: 0 0 16px rgba(139, 26, 26, 0.3);
        }

        .card {
            background: linear-gradient(145deg, var(--bg-card) 0%, var(--bg-panel) 100%);
            border: 1px solid var(--border-gold);
            border-radius: 10px;
            padding: 24px;
            box-shadow: 0 4px 20px var(--shadow-dark);
        }

        input, select, textarea {
            font-family: var(--font-body);
            font-size: 0.95rem;
            padding: 10px 14px;
            background: var(--bg-dark);
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            color: var(--text-light);
            width: 100%;
            transition: border-color 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--gold);
            box-shadow: 0 0 8px rgba(201, 168, 76, 0.15);
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: var(--gold);
            font-family: var(--font-title);
            font-size: 1rem;
        }

        .error-msg {
            color: #e05555;
            background: rgba(139, 26, 26, 0.15);
            border: 1px solid rgba(139, 26, 26, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin: 12px 0;
        }

        .back-link {
            display: inline-block;
            margin-top: 24px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--gold);
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.8rem;
            color: var(--gold);
            margin-bottom: 24px;
            text-shadow: 0 0 12px rgba(201, 168, 76, 0.2);
        }

        .nav-icon-btn {
            background: none;
            border: 1px solid var(--border-gold);
            border-radius: 6px;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 6px 10px;
            margin-left: 16px;
            transition: all 0.2s;
        }
        .nav-icon-btn:hover {
            border-color: var(--gold);
            color: var(--gold);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">Miniventure RPG</a>
        <div class="nav-links">
            <a href="/">Início</a>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="/static/js/api.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
